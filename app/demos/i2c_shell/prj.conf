CONFIG_I2C=y
CONFIG_I2C_TARGET=y
CONFIG_SHELL=y
CONFIG_I2C_SHELL=y

CONFIG_SHELL_CMDS=n
CONFIG_SHELL_HELP=y
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_STATS=n
CONFIG_SHELL_CMDS_RESIZE=n
CONFIG_SHELL_CMDS_SELECT=n
CONFIG_SHELL_CMDS_RETURN_VALUE=n
CONFIG_SHELL_DEVICE_HELPERS=n
CONFIG_DEVICE_SHELL=n
CONFIG_DEVMEM_SHELL=n

CONFIG_LOG=y

CONFIG_NEWLIB_LIBC=y
CONFIG_NEWLIB_LIBC_FLOAT_PRINTF=y

CONFIG_FPU=y

#usefule for seeing runtime info.
CONFIG_KERNEL_SHELL=y
CONFIG_THREAD_MONITOR=y

#add a reboot command
CONFIG_REBOOT=y

CONFIG_SENSOR=y
CONFIG_SENSOR_SHELL=y
CONFIG_SENSOR_INFO=y
