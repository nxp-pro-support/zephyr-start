# Minimal bench-tool firmware: the useful behavior comes from Zephyr shell
# modules plus enabled drivers, not from application bus code.

CONFIG_LOG=y
CONFIG_LOG_CMDS=y

# Demo module command from modules/module-sample.
CONFIG_COW=y

CONFIG_SHELL=y
CONFIG_SHELL_HELP=y
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_DEVICE_HELPERS=y
CONFIG_SHELL_PROMPT_UART="frdm-tool:~$ "

CONFIG_DEVICE_SHELL=y
CONFIG_DEVICE_DT_METADATA=y

CONFIG_REBOOT=y
CONFIG_KERNEL_SHELL=y
CONFIG_THREAD_MONITOR=y

CONFIG_I2C=y
CONFIG_I2C_SHELL=y

CONFIG_GPIO=y
CONFIG_GPIO_SHELL=y
CONFIG_GPIO_SHELL_INFO_CMD=y
CONFIG_GPIO_SHELL_TOGGLE_CMD=y
CONFIG_GPIO_SHELL_BLINK_CMD=y
