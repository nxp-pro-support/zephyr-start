# IPv4 addresses are assigned in main.c (iface_set_static), not via Kconfig.

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_NET_SHELL=y


CONFIG_ETH_LAN865X_IRQ_THREAD_STACK_SIZE=2048
CONFIG_DMA=y
CONFIG_SPI_MCUX_FLEXCOMM_DMA=y

# Disable ENET hardware checksum offload. With bridging, frames are L2-forwarded
# with checksums already computed by the origin; the ENET TX checksum-insertion
# engine would recompute and CORRUPT them (e.g. bridged ICMP replies egressing
# RJ45 get a bad checksum and the peer drops them). Off -> software checksums,
# and forwarded frames pass through untouched.
CONFIG_ETH_NXP_ENET_HW_ACCELERATION=n


CONFIG_NET_ETHERNET_BRIDGE_ETH_INTERFACE_COUNT=5
CONFIG_NET_IF_MAX_IPV4_COUNT=8
CONFIG_NET_IF_MAX_IPV6_COUNT=8




CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV6=n
CONFIG_NET_IPV4=y
CONFIG_NET_ARP=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=n
CONFIG_NET_SOCKETS=y

CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y

# Addresses come from main.c, so disable the Kconfig static-IP path and DHCP
# to avoid them assigning competing addresses at boot.
CONFIG_NET_CONFIG_SETTINGS=n
CONFIG_NET_DHCPV4=n

CONFIG_ETH_LAN865X=y

CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_MAIN_STACK_SIZE=3072
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=4096

CONFIG_NET_PKT_RX_COUNT=8
CONFIG_NET_PKT_TX_COUNT=8
CONFIG_NET_BUF_RX_COUNT=24
CONFIG_NET_BUF_TX_COUNT=24
CONFIG_NET_BUF_DATA_SIZE=128
CONFIG_NET_MAX_CONTEXTS=6

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_LOG_DEFAULT_LEVEL=3



#CONFIG_NET_ETHERNET_BRIDGE=y
#CONFIG_NET_ETHERNET_BRIDGE_SHELL=y
#CONFIG_NET_ETHERNET_BRIDGE_LOG_LEVEL_DBG=y