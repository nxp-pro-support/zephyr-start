<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LIGHT STUDIO — T1S</title>
<style>
:root{
  --night:#000000;
  --jet:#343533;
  --persian:#66A8A6;
  --tiffany:#89CBC5;
  --orange:#ED721B;
  --hot:#E74717;
  --hairline:rgba(52,53,51,.85);
  --font-display:"Brandon Grotesque","Avenir Next","Futura","Century Gothic",system-ui,sans-serif;
  --font-body:"Avenir Next","Avenir","Segoe UI",system-ui,sans-serif;
  --font-mono:"Cascadia Code","SF Mono",Consolas,monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--night);
  color:var(--tiffany);
  font-family:var(--font-body);
  font-size:14px;
  min-height:100vh;
}
/* ---------- hero ---------- */
.hero{
  text-align:center;
  padding:84px 24px 64px;
  position:relative;
  overflow:hidden;
}
.hero::before{
  content:"";position:absolute;inset:-40% -20%;
  background:
    radial-gradient(38% 45% at 38% 38%, rgba(231,71,23,.12), transparent 70%),
    radial-gradient(34% 40% at 64% 56%, rgba(137,203,197,.10), transparent 70%);
  pointer-events:none;
  animation:drift 14s ease-in-out infinite alternate;
}
@keyframes drift{to{transform:translate(3%,4%) scale(1.05)}}
.eyebrow{
  font-family:var(--font-display);font-weight:200;
  font-size:11px;letter-spacing:.6em;text-transform:uppercase;
  color:var(--persian);
  margin-bottom:26px;
}
.hero h1{
  font-family:var(--font-display);
  font-weight:100;
  font-size:clamp(44px, 8vw, 92px);
  letter-spacing:.28em;
  text-transform:uppercase;
  color:#fff;
  line-height:1;
  text-indent:.28em;
}
.hero h1 b{font-weight:100;color:var(--hot)}
.hero .rule{width:64px;height:1px;background:var(--orange);margin:34px auto 0}
.hero .sub{
  margin-top:22px;font-size:12px;color:var(--jet);
  letter-spacing:.18em;text-transform:uppercase;
}
.hero .sub b{color:var(--tiffany);font-weight:normal}
/* ---------- gallery ---------- */
.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(240px, 280px));
  justify-content:center;
  gap:22px;
  padding:0 40px 100px;
  max-width:1240px;margin:0 auto;
}
.card{
  position:relative;
  aspect-ratio:4/5;
  border:1px solid var(--hairline);
  background:#000;
  cursor:pointer;
  overflow:hidden;
  display:flex;flex-direction:column;justify-content:flex-end;
  transition:transform .35s cubic-bezier(.2,.8,.2,1), border-color .25s, opacity .3s;
  opacity:0;translate:0 16px;
  animation:up .6s ease forwards;
}
@keyframes up{to{opacity:1;translate:0 0}}
.card:hover{transform:translateY(-6px);border-color:var(--orange)}
.card.active{border-color:var(--hot)}
.card.leaving{opacity:0!important;transform:scale(.96)}
.card .glow{
  position:absolute;inset:0;
  background:radial-gradient(60% 50% at 50% 36%, var(--c, #000) 0%, transparent 75%);
  opacity:.8;
  filter:saturate(1.1);
  transition:background .2s;
}
.card .scrim{
  position:absolute;inset:0;
  background:linear-gradient(transparent 55%, rgba(0,0,0,.92) 86%);
}
.card .meta{position:relative;padding:22px}
.card .name{
  font-family:var(--font-display);font-weight:200;
  letter-spacing:.3em;text-transform:uppercase;font-size:13px;color:#fff;
}
.card .sub{margin-top:7px;font-family:var(--font-mono);font-size:10px;color:var(--persian)}
.card .badge{
  position:absolute;top:16px;right:16px;
  font-family:var(--font-mono);font-size:10px;
  color:var(--tiffany);
  border:1px solid var(--hairline);
  padding:4px 8px;border-radius:2px;
  background:rgba(0,0,0,.5);
}
/* ---------- empty state ---------- */
.empty{
  grid-column:1/-1;
  text-align:center;
  padding:70px 20px;
  border:1px dashed var(--hairline);
  color:var(--jet);
  font-family:var(--font-display);font-weight:200;
  letter-spacing:.4em;text-transform:uppercase;font-size:12px;
}
.empty .dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--orange);margin-right:14px;vertical-align:1px;
  animation:scan 1.6s ease-in-out infinite;
}
@keyframes scan{50%{opacity:.25}}
/* ---------- editor drawer ---------- */
.editor{
  position:fixed;left:0;right:0;bottom:0;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(10px);
  border-top:1px solid var(--hairline);
  transform:translateY(105%);
  transition:transform .45s cubic-bezier(.2,.8,.2,1);
  z-index:10;
}
.editor.open{transform:none}
.editor .inner{
  max-width:860px;margin:0 auto;
  display:grid;grid-template-columns:auto 1fr auto;
  gap:44px;align-items:center;
  padding:30px 40px 36px;
}
.editor .who .name{
  font-family:var(--font-display);font-weight:200;letter-spacing:.3em;
  text-transform:uppercase;font-size:15px;color:#fff;
}
.editor .who .ip{font-family:var(--font-mono);font-size:10px;color:var(--persian);margin-top:6px}
.editor .who .hex{font-family:var(--font-mono);font-size:12px;color:var(--tiffany);margin-top:14px;letter-spacing:.15em}
.sliders{display:flex;flex-direction:column;gap:12px}
.srow{display:grid;grid-template-columns:14px 1fr 40px;gap:16px;align-items:center}
.srow label{font-family:var(--font-mono);font-size:11px;color:var(--persian)}
.srow .v{font-family:var(--font-mono);font-size:11px;text-align:right;color:var(--tiffany)}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:20px;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:1px;background:var(--jet)}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:14px;height:14px;margin-top:-7px;
  border-radius:50%;background:var(--night);
  border:2px solid var(--orange);
  box-shadow:0 0 12px rgba(237,114,27,.5);
}
input[type=range]:hover::-webkit-slider-thumb{border-color:var(--hot)}
input[type=range]::-moz-range-track{height:1px;background:var(--jet)}
input[type=range]::-moz-range-thumb{
  width:12px;height:12px;border-radius:50%;background:var(--night);
  border:2px solid var(--orange);box-shadow:0 0 12px rgba(237,114,27,.5);
}
.presets{display:flex;flex-direction:column;gap:12px;align-items:center}
.presets .t{font-size:9px;letter-spacing:.4em;text-transform:uppercase;color:var(--jet)}
.dots{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pdot{
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  border:1px solid var(--hairline);
  transition:transform .15s, box-shadow .15s;
}
.pdot:hover{transform:scale(1.18);box-shadow:0 0 14px currentColor}
.editor .close{
  position:absolute;top:14px;right:20px;
  font-family:var(--font-mono);font-size:11px;color:var(--jet);
  background:none;border:none;cursor:pointer;letter-spacing:.2em;
}
.editor .close:hover{color:var(--hot)}
/* firmware update bar */
.fwbar{
  max-width:860px;margin:0 auto;
  display:flex;align-items:center;gap:18px;
  padding:0 40px 24px;
  border-top:1px solid rgba(52,53,51,.4);
  padding-top:16px;
}
.fwbtn{
  font-family:var(--font-mono);font-size:10px;letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--persian);background:none;cursor:pointer;
  border:1px solid var(--jet);padding:9px 16px;
  transition:border-color .2s,color .2s;
}
.fwbtn:hover{border-color:var(--orange);color:#fff}
.fwbtn:disabled{opacity:.4;cursor:wait}
.fwstat{font-family:var(--font-mono);font-size:10px;color:var(--persian)}
@media (max-width:720px){
  .editor .inner{grid-template-columns:1fr;gap:24px;padding:24px}
  .presets .dots{grid-template-columns:repeat(6,1fr)}
}
</style>
</head>
<body>

<section class="hero">
  <p class="eyebrow">10BASE-T1S &middot; Single pair Ethernet</p>
  <h1>L<b>i</b>ght Studio</h1>
  <div class="rule"></div>
  <p class="sub">RW612 bridge <b>2.2.2.5</b> &nbsp;&middot;&nbsp; <b id="count">0</b> nodes on segment</p>
</section>

<section class="gallery" id="gallery">
  <div class="empty" id="empty"><span class="dot"></span>Scanning segment&hellip;</div>
</section>

<div class="editor" id="editor">
  <button class="close" id="close">ESC ✕</button>
  <div class="inner">
    <div class="who">
      <div class="name" id="e-name">—</div>
      <div class="ip" id="e-ip">—</div>
      <div class="hex" id="e-hex">#000000</div>
    </div>
    <div class="sliders" id="e-sliders"></div>
    <div class="presets">
      <span class="t">Presets</span>
      <div class="dots" id="e-presets"></div>
    </div>
  </div>
  <div class="fwbar">
    <input type="file" id="fw-file" accept=".bin" hidden>
    <button class="fwbtn" id="fw-btn">Update firmware &#8682;</button>
    <span class="fwstat" id="fw-stat">drop a signed image (zephyr.signed.bin)</span>
  </div>
</div>

<script>
"use strict";
/* ------------------------------------------------------------------ *
 *  Discovery: probe every candidate IP on the T1S segment with a
 *  WebSocket. A card exists only while its socket is open; closed or
 *  unreachable devices keep retrying in the background and pop up
 *  automatically when they join the segment.
 * ------------------------------------------------------------------ */
const SEGMENT_PREFIX = "2.2.2.";
const SCAN_FIRST = 6, SCAN_LAST = 12;   /* probes 2.2.2.6 … 2.2.2.12 */
const RETRY_MS = 3000;
const SEND_INTERVAL_MS = 40;            /* ~25 updates/s while dragging */

const PRESETS = ["#E74717","#ED721B","#89CBC5","#66A8A6","#FFFFFF","#000000"];

const candidates = new Set();
if (/^\d+\.\d+\.\d+\.\d+$/.test(location.hostname)) candidates.add(location.hostname);
for (let i = SCAN_FIRST; i <= SCAN_LAST; i++) candidates.add(SEGMENT_PREFIX + i);

const nodes = new Map();   /* ip -> {ip, ws, name, plca, r,g,b, el} */
let current = null;        /* node open in the editor */

const hex = n => "#" + [n.r,n.g,n.b].map(v=>v.toString(16).padStart(2,"0")).join("").toUpperCase();

function probe(ip){
  let ws;
  try { ws = new WebSocket("ws://" + ip + "/ws"); }
  catch (e) { setTimeout(()=>probe(ip), RETRY_MS); return; }

  ws.onmessage = ev => {
    let st;
    try { st = JSON.parse(ev.data); } catch (e) { return; }
    upsert(ip, ws, st);
  };
  ws.onclose = () => {
    drop(ip);
    setTimeout(()=>probe(ip), RETRY_MS);
  };
}
candidates.forEach(probe);

/* ------------------------------ cards ------------------------------ */
const gallery = document.getElementById("gallery");
const emptyEl = document.getElementById("empty");

function upsert(ip, ws, st){
  let n = nodes.get(ip);
  if (!n){
    n = { ip, ws };
    n.el = document.createElement("div");
    n.el.className = "card";
    n.el.innerHTML = `
      <div class="glow"></div>
      <div class="scrim"></div>
      <span class="badge"></span>
      <div class="meta">
        <div class="name"></div>
        <div class="sub"></div>
      </div>`;
    n.el.addEventListener("click", ()=>openEditor(n));
    gallery.appendChild(n.el);
    nodes.set(ip, n);
  }
  n.ws = ws;
  n.name = st.name; n.plca = st.plca; n.ver = st.ver;
  n.r = st.r|0; n.g = st.g|0; n.b = st.b|0;
  n.el.querySelector(".name").textContent = st.name;
  n.el.querySelector(".badge").textContent = "PLCA " + st.plca;
  n.el.querySelector(".sub").textContent = ip + (st.ver ? " · v" + st.ver : "") + " · online";
  n.el.querySelector(".glow").style.setProperty("--c", hex(n));
  if (current === n && !dragging) refreshEditor();
  refreshCount();
}

function drop(ip){
  const n = nodes.get(ip);
  if (!n) return;
  if (current === n) closeEditor();
  n.el.classList.add("leaving");
  setTimeout(()=>n.el.remove(), 300);
  nodes.delete(ip);
  refreshCount();
}

function refreshCount(){
  document.getElementById("count").textContent = nodes.size;
  emptyEl.style.display = nodes.size ? "none" : "";
}

/* ----------------------------- editor ------------------------------ */
const editor  = document.getElementById("editor");
const sliders = document.getElementById("e-sliders");
let dragging = false;

sliders.innerHTML = ["r","g","b"].map(c=>`
  <div class="srow">
    <label>${c.toUpperCase()}</label>
    <input type="range" min="0" max="255" value="0" data-ch="${c}">
    <span class="v" data-v="${c}">0</span>
  </div>`).join("");

const pr = document.getElementById("e-presets");
for (const p of PRESETS){
  const dot = document.createElement("div");
  dot.className = "pdot";
  dot.style.background = p;
  dot.style.color = p;
  dot.addEventListener("click", ()=>{
    if (!current) return;
    current.r = parseInt(p.slice(1,3),16);
    current.g = parseInt(p.slice(3,5),16);
    current.b = parseInt(p.slice(5,7),16);
    refreshEditor(); queueSend(current);
  });
  pr.appendChild(dot);
}

function refreshEditor(){
  if (!current) return;
  document.getElementById("e-hex").textContent = hex(current);
  sliders.querySelectorAll("input").forEach(s=>{
    s.value = current[s.dataset.ch];
    sliders.querySelector(`[data-v=${s.dataset.ch}]`).textContent = current[s.dataset.ch];
  });
  current.el.querySelector(".glow").style.setProperty("--c", hex(current));
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  current.el.classList.add("active");
}

function openEditor(n){
  current = n;
  document.getElementById("e-name").textContent = n.name;
  document.getElementById("e-ip").textContent =
    n.ip + " · PLCA node " + n.plca + (n.ver ? " · firmware v" + n.ver : "");
  refreshEditor();
  editor.classList.add("open");
}
function closeEditor(){
  editor.classList.remove("open");
  document.querySelectorAll(".card").forEach(c=>c.classList.remove("active"));
  current = null;
}

sliders.addEventListener("input", e=>{
  if (!current || e.target.tagName !== "INPUT") return;
  current[e.target.dataset.ch] = +e.target.value;
  refreshEditor(); queueSend(current);
});
sliders.addEventListener("pointerdown", ()=>dragging=true);
addEventListener("pointerup", ()=>dragging=false);

document.getElementById("close").addEventListener("click", closeEditor);
addEventListener("keydown", e=>e.key==="Escape" && closeEditor());

/* ------------------------ firmware update (OTA) -------------------- */
const fwFile = document.getElementById("fw-file");
const fwBtn  = document.getElementById("fw-btn");
const fwStat = document.getElementById("fw-stat");

fwBtn.addEventListener("click", ()=> current && fwFile.click());
fwFile.addEventListener("change", ()=>{
  if (!current || !fwFile.files.length) return;
  const file = fwFile.files[0];
  const name = current.name;
  const xhr = new XMLHttpRequest();
  xhr.open("POST", "http://" + current.ip + "/firmware");
  xhr.upload.onprogress = e => {
    if (e.lengthComputable) fwStat.textContent =
      "uploading to " + name + " — " + Math.round(e.loaded/e.total*100) + "%";
  };
  xhr.onload = () => {
    fwStat.textContent = xhr.status === 200
      ? name + " is rebooting — its card returns with the new version"
      : "upload failed (HTTP " + xhr.status + ")";
  };
  xhr.onerror = () => fwStat.textContent = "upload failed (network)";
  xhr.onloadend = () => { fwBtn.disabled = false; fwFile.value = ""; };
  fwBtn.disabled = true;
  fwStat.textContent = "uploading to " + name + " — 0%";
  xhr.send(file);
});

/* ----------------------- throttled WS transmit --------------------- */
let sendTimer = null, sendDirty = false;
function queueSend(n){
  if (sendTimer){ sendDirty = true; return; }
  txNow(n);
  sendTimer = setTimeout(()=>{
    sendTimer = null;
    if (sendDirty){ sendDirty = false; current && queueSend(current); }
  }, SEND_INTERVAL_MS);
}
function txNow(n){
  if (n.ws && n.ws.readyState === WebSocket.OPEN){
    n.ws.send(JSON.stringify({r:n.r, g:n.g, b:n.b}));
  }
}
</script>
</body>
</html>
