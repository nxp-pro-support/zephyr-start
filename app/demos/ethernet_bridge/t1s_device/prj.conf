CONFIG_NETWORKING=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV6=n
CONFIG_NET_IPV4=y
CONFIG_NET_ARP=y
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_SOCKETS=y

CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y

# Periodic gratuitous ARP (RFC 5227). Windows parks unanswered neighbors in
# an "Unreachable" backoff state and then silently refuses to transmit to
# them (observed: SMP/UDP requests dropped before the wire until the device
# pings the PC). The periodic GARP re-seeds the PC's neighbor entry so the
# dashboard/smpmgr work without a manual warm-up ping.
CONFIG_NET_ARP_GRATUITOUS=y
CONFIG_NET_ARP_GRATUITOUS_TRANSMISSION=y
CONFIG_NET_ARP_GRATUITOUS_INTERVAL=20

CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_NEED_IPV4=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.100"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.2.1"

CONFIG_ETH_LAN865X=y

# RGB LED on CTIMER2 PWM channels
CONFIG_PWM=y

# HTTP server + WebSocket serving the LIGHT STUDIO dashboard
CONFIG_HTTP_SERVER=y
CONFIG_HTTP_SERVER_WEBSOCKET=y
CONFIG_WEBSOCKET_MAX_CONTEXTS=4
CONFIG_JSON_LIBRARY=y
# Larger body chunks for the firmware upload (fewer handler round-trips)
CONFIG_HTTP_SERVER_CLIENT_BUFFER_SIZE=1024

# Browsers reconnect aggressively; don't hold sockets in TIME_WAIT
CONFIG_NET_TCP_TIME_WAIT_DELAY=0

# --- Firmware update over HTTP: POST /firmware streams the signed image
# into slot1 (flash_img), marks it for test boot, then reboots. MCUboot
# validates/swaps; the app self-confirms once the web server is up.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_IMG_ERASE_PROGRESSIVELY=y
CONFIG_REBOOT=y

# HTTP server + 3 WS clients + TCP all need fds/poll entries
CONFIG_ZVFS_OPEN_MAX=16
CONFIG_ZVFS_POLL_MAX=16

CONFIG_TEST_RANDOM_GENERATOR=y

CONFIG_MAIN_STACK_SIZE=3072
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Pools sized for a few parallel browser TCP connections + WS streams
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=48
CONFIG_NET_BUF_TX_COUNT=48
CONFIG_NET_BUF_DATA_SIZE=128
CONFIG_NET_MAX_CONTEXTS=10
CONFIG_NET_MAX_CONN=10

CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Debug instrumentation: `net stats` on the shell shows per-protocol
# RX/TX/drop counters (ICMP included) to localize packet loss.
CONFIG_NET_STATISTICS=y
CONFIG_NET_STATISTICS_USER_API=y
